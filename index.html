<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Login — Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn" data-theme="light" title="Light Mode">
            <i class="fa-solid fa-sun"></i>
        </button>
        <button class="theme-btn" data-theme="dark" title="Dark Mode">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="theme-btn" data-theme="blue" title="Blue Theme">
            <i class="fa-solid fa-droplet"></i>
        </button>
        <button class="theme-btn" data-theme="purple" title="Purple Theme">
            <i class="fa-solid fa-palette"></i>
        </button>
    </div>
    <div class="container">
        <div class="circle-container" id="circleContainer"></div>
        <div class="login-box">
            <h2>Secure Login</h2>
            <p class="subtitle">Experience advanced colours, enhanced controls, and smarter login feedback.</p>
            <form action="#" id="loginForm">
                <div class="input-group">
                    <input id="email" type="email" placeholder="Email" required>
                    <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
                </div>
                <div class="input-group password-group">
                    <input id="password" type="password" placeholder="Password" required>
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <button type="button" class="toggle-password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
                </div>
                <div class="form-row">
                    <label class="remember-me"><input type="checkbox" id="rememberMe"> Remember me</label>
                    <a href="#" class="link">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
                <div class="message" id="message"></div>
            </form>
            <div class="social-login">
                <p>Or sign in with</p>
                <div class="social-icons">
                    <div class="social-icon facebook" data-provider="Facebook">F</div>
                    <div class="social-icon twitter" data-provider="X">X</div>
                    <div class="social-icon google" data-provider="Google">G</div>
                </div>
            </div>
            <div class="signup-link">
                <p>New here? <a href="#">Create account</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
