<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #ffc0cb 0%, #ffb6c1 40%, #ffe4e1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: "💕 🙏 💕 🙏";
      position: absolute;
      top: 15%;
      left: -5%;
      font-size: 6rem;
      opacity: 0.12;
      transform: rotate(-15deg);
      white-space: nowrap;
    }

    .card {
      position: relative;
      width: 360px;
      padding: 32px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }

    .card h1 {
      margin: 0 0 18px;
      font-size: 1.8rem;
      color: #d81b60;
      text-align: center;
    }

    .card p {
      margin: 0 0 24px;
      text-align: center;
      color: #555;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #a61d55;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border-radius: 14px;
      border: 1px solid #f0c1d6;
      background: #fff0f5;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .actions button {
      flex: 1;
      min-width: 140px;
      padding: 12px 16px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
    }

    .create {
      background: transparent;
      color: #d81b60;
      border: 2px solid #d81b60;
    }

    .signup {
      background: #d81b60;
      color: white;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      color: #a61d55;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Enter your personal detail 💕🙏</h1>
    <p>Welcome! Use your mail ID and password to sign in or create a new account.</p>
    <form>
      <label for="email">Username / Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />

      <div class="actions">
        <button type="button" class="create">Create new account</button>
        <button type="submit" class="signup">Sign up</button>
      </div>
    </form>
    <div class="note">Namaste! Your details are safe and secure.</div>
  </div>
</body>
</html>
